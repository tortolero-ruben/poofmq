name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Compile Proto Contract
        if: matrix.php-version == '8.4'
        run: |
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD":/defs namely/protoc-all:1.51_2 -d proto -l descriptor_set -o /defs/.tmp-proto --descr-filename poofmq.pb
          test -f .tmp-proto/poofmq.pb
          rm -rf .tmp-proto

      - name: Tests
        run: ./vendor/bin/pest

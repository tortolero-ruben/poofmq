# poofMQ Redis Configuration - Local Development
# See: https://redis.io/docs/latest/operate/oss_and_stack/management/config/
#
# This configuration supports poofMQ's ephemeral queue workload with graceful
# degradation under memory pressure. Keys are namespaced under poofmq:v1:* as
# defined in ADR-0001.

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================

# Maximum memory limit for local development.
# 256MB provides ample room for queue testing.
maxmemory 256mb

# Eviction policy for graceful overload handling.
#
# volatile-ttl: Evict keys with TTL set, preferring those with shorter TTL.
# This is ideal for poofMQ because:
#   - All queue and auth keys have TTL (per ADR-0001)
#   - Messages near expiry are evicted first (minimal data loss)
#   - Never evicts keys without TTL (protects any persistent config)
maxmemory-policy volatile-ttl

# Number of keys to sample when checking for eviction.
# Higher values = more accurate TTL-based eviction but slightly more CPU.
maxmemory-samples 10

# =============================================================================
# PERSISTENCE (Disabled for Ephemeral Queue Workload)
# =============================================================================

# poofMQ queues are ephemeral by design. Persistence is disabled to reduce
# disk I/O and latency. Queue state is rebuilt on restart from producers.

# Disable RDB snapshots
save ""

# Disable AOF persistence
appendonly no

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================

# Disable THP (Transparent Huge Pages) warning - handled at OS level
disable-thp yes

# Connection backlog for burst traffic
tcp-backlog 511

# Timeout for idle connections (0 = disabled, let clients manage)
timeout 0

# TCP keepalive for detecting dead peers
tcp-keepalive 300

# =============================================================================
# LOGGING
# =============================================================================

# Log level: debug, verbose, notice, warning
loglevel notice

# =============================================================================
# SLOW LOG (for performance monitoring)
# =============================================================================

# Log queries slower than this (microseconds)
slowlog-log-slower-than 10000

# Maximum slow log entries to keep
slowlog-max-len 128
